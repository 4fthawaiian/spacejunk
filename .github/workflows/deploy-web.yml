name: Deploy Web
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build web --release

      # TLE fetch is skipped during CelesTrak cooldown (server IP blocked until ~2026-06-13).
      # The server has a static 15,834-object cache. When cooldown ends, remove the
      # 'if: false' below and the --exclude=api/ in the rsync ARGS to resume live fetching.
      - name: Fetch TLE snapshot (SKIPPED during cooldown)
        if: false
        run: |
          mkdir -p build/web/api
          node scripts/fetch-tle.mjs --output build/web/api/tle.json --timeout 20 || {
            rm -f build/web/api/tle.json
            echo '⚠ TLE fetch failed — server keeps its existing cache'
          }

      - uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          # --exclude=api/ prevents --delete from wiping the server's cached TLE snapshot
          ARGS: "-avz --delete --exclude=api/"
          SOURCE: "build/web/"
          REMOTE_HOST: "server.4ft.me"
          REMOTE_USER: "root"
          TARGET: "/opt/junk/"
          EXCLUDE: ""
