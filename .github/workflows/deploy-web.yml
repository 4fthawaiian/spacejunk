name: Deploy Web
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build web --release

      # Fetch TLE snapshot from CelesTrak and bundle with the app.
      # This ensures the app always has live data even if CelesTrak
      # is unreachable from the client. Falls back gracefully if
      # the fetch fails (CI runner might also be rate-limited).
      - name: Fetch TLE snapshot
        run: |
          mkdir -p build/web/api
          node scripts/fetch-tle.mjs --output build/web/api/tle.json --timeout 20 || \
            echo '⚠ TLE fetch failed (CI runner may be rate-limited) — app will use procedural fallback'

      - uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "build/web/"
          REMOTE_HOST: "server.4ft.me"
          REMOTE_USER: "root"
          TARGET: "/opt/junk/"
          EXCLUDE: ""
