# =============================================================================
# Nginx config: CelesTrak caching proxy for SpaceJunk
# =============================================================================
#
# Add this inside your server block on server.4ft.me.
#
# Two approaches — pick ONE:
#
#   A) Static file (if CI generates build/web/api/tle.json)
#      Simple, no upstream dependency, always works.
#
#   B) Proxy_pass + cache (keeps data fresh between deploys)
#      Requires Celestrak to not block the server IP.
#
# Recommended: use BOTH — serve /api/tle.json as static if present,
# fall back to the proxy.

# ----------------------------------------------------------------------
# Cache zone (define once in http{} block)
# ----------------------------------------------------------------------
# proxy_cache_path /var/cache/nginx/tle levels=1:2
#                  keys_zone=tle_cache:10m max_size=100m
#                  inactive=2h use_temp_path=off;

# ----------------------------------------------------------------------
# Option A: Static JSON snapshot (bundled at CI build time)
# ----------------------------------------------------------------------
location = /api/tle.json {
    add_header Cache-Control "public, max-age=1800, stale-while-revalidate=86400";
    add_header X-TLE-Source "static-snapshot";
    try_files $uri @tle-proxy;
}

# ----------------------------------------------------------------------
# Option B: Proxy to CelesTrak with caching
# ----------------------------------------------------------------------
location @tle-proxy {
    # Cache valid responses for 30 minutes, stale for 24h
    proxy_cache tle_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_valid 200 30m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    proxy_cache_background_update on;
    proxy_cache_lock on;

    # Forward to CelesTrak with all groups the app uses.
    # We hardcode the params because the original request to /api/tle.json
    # has no query string ($query_string is empty).
    proxy_pass https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&GROUP=visual&GROUP=last-30-days&GROUP=amateur&GROUP=cubesat&GROUP=active&GROUP=science&GROUP=geo&GROUP=gps-ops&FORMAT=json;
    proxy_ssl_server_name on;

    # Headers
    proxy_set_header Host celestrak.org;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_set_header User-Agent "SpaceJunk/1.0 (+https://spacejunk.4ft.me)";

    # CORS for direct browser access (though app uses same-origin)
    add_header Access-Control-Allow-Origin "*";
    add_header X-TLE-Source "cached-proxy";

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
}

# ----------------------------------------------------------------------
# Or: serve the per-group endpoints too (for advanced use)
# ----------------------------------------------------------------------
location /api/tle/ {
    proxy_cache tle_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_valid 200 30m;
    proxy_cache_use_stale error timeout updating;
    proxy_pass https://celestrak.org/NORAD/elements/gp.php?$query_string;
    proxy_ssl_server_name on;
    proxy_set_header Host celestrak.org;
    proxy_set_header User-Agent "SpaceJunk/1.0 (+https://spacejunk.4ft.me)";
    add_header Access-Control-Allow-Origin "*";
    add_header X-TLE-Source "cached-proxy";
}
