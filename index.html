<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SpaceJunk — Interactive 3D visualization of space debris orbiting Earth. Explore LEO, MEO, GEO, and untracked debris with live data from CelesTrak.">
  <meta name="keywords" content="space debris, orbital debris, space junk, satellite tracker, CelesTrak, SGP4, LEO, MEO, GEO, Earth orbit visualization">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Canonical -->
  <link rel="canonical" href="https://spacejunk.4ft.me/">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpaceJunk">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme -->
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Open Graph -->
  <meta property="og:title" content="SpaceJunk — 3D Space Debris Visualizer">
  <meta property="og:description" content="Interactive real-time 3D visualization of space debris orbiting Earth — live data from CelesTrak, SGP4 propagation, and procedural debris across all orbital shells.">
  <meta property="og:url" content="https://spacejunk.4ft.me/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://spacejunk.4ft.me/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="SpaceJunk">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SpaceJunk — 3D Space Debris Visualizer">
  <meta name="twitter:description" content="Interactive real-time 3D visualization of space debris orbiting Earth — live data from CelesTrak, SGP4 propagation, and procedural debris across all orbital shells.">
  <meta name="twitter:image" content="https://spacejunk.4ft.me/icons/Icon-512.png">

  <title>SpaceJunk — 3D Space Debris Visualizer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #000;
      transition: opacity 1s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top: 3px solid #ff6b35;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Orbital data loading…</p>
  </div>

  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').classList.add('hidden');
    });
    // Fallback: hide after 5s anyway
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 5000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
